<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行動盤點同步助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-slate-50 pb-32 text-slate-900">

    <!-- 導航欄 -->
    <nav class="bg-white border-b sticky top-0 z-40 px-4 py-3 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg text-white">
                <i class="fas fa-box"></i>
            </div>
            <h1 class="font-bold text-slate-800">行動盤點同步助手</h1>
        </div>
        <div id="syncStatus" class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">連線中...</div>
    </nav>

    <main class="max-w-2xl mx-auto p-4">
        <!-- 錯誤訊息 -->
        <div id="errorBanner" class="hidden mb-4 p-3 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-xs flex items-center justify-between">
            <span id="errorText" class="flex items-center gap-2 font-bold"><i class="fas fa-exclamation-triangle"></i> 錯誤訊息</span>
            <button onclick="hideError()"><i class="fas fa-times"></i></button>
        </div>

        <!-- 頂部按鈕 -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="showModal('resetConfirmModal')" class="flex items-center gap-2 bg-white border border-red-100 px-4 py-2.5 rounded-xl text-xs font-bold shadow-sm whitespace-nowrap text-red-500 active:bg-red-50 transition-colors">
                <i class="fas fa-sync-alt"></i> 重置/清空資料
            </button>
            <button onclick="handleExportExcel()" class="flex items-center gap-2 bg-white border border-slate-100 px-4 py-2.5 rounded-xl text-xs font-bold shadow-sm whitespace-nowrap active:bg-slate-50 ml-auto transition-colors">
                <i class="fas fa-file-excel text-emerald-500"></i> 匯出盤點單 (Excel)
            </button>
        </div>

        <!-- 搜尋與過濾 -->
        <div class="space-y-4 mb-6">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="搜尋品名、編碼..." 
                    class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm"
                    oninput="renderItems()"
                />
            </div>
            
            <div id="categoryTabs" class="flex gap-1.5 overflow-x-auto no-scrollbar py-1">
                <!-- 類別標籤動態生成 -->
            </div>
        </div>

        <!-- 品項列表 -->
        <div id="inventoryList" class="grid gap-3">
            <div class="flex flex-col items-center justify-center py-20 text-slate-300">
                <i class="fas fa-spinner fa-spin mb-2 text-2xl"></i>
                <span class="text-xs">雲端資料載入中...</span>
            </div>
        </div>
    </main>

    <!-- 底部操作欄 -->
    <div class="fixed bottom-0 inset-x-0 bg-white/80 backdrop-blur-xl border-t p-4 flex gap-3 pb-10 z-40 shadow-2xl">
        <button onclick="showModal('addItemModal')" class="w-14 h-14 bg-slate-100 text-slate-600 rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-transform shrink-0 hover:bg-slate-200">
            <i class="fas fa-plus text-xl"></i>
        </button>
        <button 
            id="submitBtn"
            onclick="handleSubmitConfirm()" 
            class="flex-1 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all bg-slate-200 text-slate-400 pointer-events-none"
        >
            <i class="fas fa-paper-plane"></i> 完成盤點並提交紀錄
        </button>
    </div>

    <!-- 彈窗內容：新增品項 -->
    <div id="addItemModal" class="hidden fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-slate-800">新增盤點品項</h2>
            <div class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-slate-400 ml-1 uppercase">品項名稱 (必填)</label>
                    <input id="new_name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20" placeholder="例如：原子筆..." />
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black text-slate-400 ml-1 uppercase">編碼 (SKU)</label>
                        <input id="new_sku" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20" placeholder="93xxxxxx" />
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black text-slate-400 ml-1 uppercase">類別</label>
                        <input id="new_cat" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20" placeholder="文具/膠帶..." />
                    </div>
                </div>
                <button onclick="handleAddItem()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 mt-4 active:scale-95 transition-transform">確認新增品項</button>
                <button onclick="closeModal('addItemModal')" class="w-full py-4 text-slate-400 font-bold">放棄返回</button>
            </div>
        </div>
    </div>

    <!-- 彈窗內容：重置確認 -->
    <div id="resetConfirmModal" class="hidden fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex items-center gap-3 text-red-500 mb-4">
                <div class="bg-red-50 p-2 rounded-full"><i class="fas fa-sync-alt fa-lg"></i></div>
                <h2 class="text-xl font-black text-slate-800">資料重置確認</h2>
            </div>
            <p class="text-sm text-slate-500 mb-8 leading-relaxed">
                請選擇您的重置方式：<br/><br/>
                <span class="text-red-600 font-bold">1. 完全清空</span>：刪除所有現用品項。<br/>
                <span class="text-indigo-600 font-bold">2. 回復預設</span>：還原為原始圖片清單 (「其他」置底)。
            </p>
            <div class="grid gap-2">
                <button onclick="initializeItems()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 active:scale-95 transition-transform">回復預設清單</button>
                <button onclick="clearAllItems()" class="w-full py-4 bg-red-500 text-white rounded-2xl font-bold">完全清空當前資料</button>
                <button onclick="closeModal('resetConfirmModal')" class="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">取消</button>
            </div>
        </div>
    </div>

    <!-- 彈窗內容：提交確認 -->
    <div id="submitConfirmModal" class="hidden fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex items-center gap-3 text-amber-500 mb-4">
                <div class="bg-amber-100 p-2 rounded-full"><i class="fas fa-exclamation-triangle fa-lg"></i></div>
                <h2 class="text-xl font-black text-slate-800">提交與歸零確認</h2>
            </div>
            <p class="text-sm text-slate-500 mb-6 leading-relaxed">
                確定提交本次盤點紀錄？<br/>提交後，手機畫面的數量將會<b>重設為 0</b>。
            </p>
            <div id="submitPreviewList" class="max-h-40 overflow-y-auto mb-6 space-y-2 pr-2">
                <!-- 預覽列表 -->
            </div>
            <div class="grid gap-2">
                <button onclick="handleSubmitInventory()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 active:scale-95 transition-transform">確認提交並歸零</button>
                <button onclick="closeModal('submitConfirmModal')" class="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">返回修改</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, updateDoc, deleteDoc, addDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'INV-HTML-PRO-02';

        // 狀態管理
        let items = [];
        let selectedCategory = '全部';
        let currentUser = null;

        // 初始品項 (與之前相同，其他置底)
        const INITIAL_ITEMS = [
            { sku: "93050399", category: "貼紙", name: "標籤貼紙80*63mm/1500張(A款)-理用", order: 1 },
            { sku: "93050399", category: "貼紙", name: "標籤貼紙35*25mm/3500張理用", order: 2 },
            { sku: "93050399", category: "貼紙", name: "公板貼(一般)", order: 3 },
            { sku: "93050399", category: "貼紙", name: "苔藍貼(可擦拭)", order: 4 },
            { sku: "93050399", category: "碳帶", name: "10M碳帶", order: 5 },
            { sku: "93050399", category: "碳帶", name: "8M碳帶", order: 6 },
            { sku: "93050399", category: "碳帶", name: "4M碳帶", order: 7 },
            { sku: "93120201", category: "碳帶", name: "EPSON LQ-690碳帶", order: 8 },
            { sku: "93050399", category: "背心袋", name: "1斤背心袋", order: 9 },
            { sku: "93050399", category: "背心袋", name: "3斤背心袋", order: 10 },
            { sku: "93050399", category: "背心袋", name: "5斤背心袋", order: 11 },
            { sku: "93050399", category: "OPP", name: "OPP-1斤透明袋", order: 12 },
            { sku: "93050399", category: "OPP", name: "OPP-2斤透明袋", order: 13 },
            { sku: "93050399", category: "OPP", name: "OPP-3斤透明袋", order: 14 },
            { sku: "93050399", category: "PE", name: "PE-1斤透明袋(蒜泥用)", order: 15 },
            { sku: "93050399", category: "PE", name: "PE-3斤透明袋(生菜用)", order: 16 },
            { sku: "93050399", category: "PE", name: "PE-5斤透明袋", order: 17 },
            { sku: "93050399", category: "PE", name: "PE-7斤透明袋(生菜用)", order: 18 },
            { sku: "93050399", category: "PE", name: "PE-洞洞袋", order: 19 },
            { sku: "93050399", category: "袋子", name: "大蔥/山藥專用袋", order: 20 },
            { sku: "93050399", category: "袋子", name: "銀耳袋", order: 21 },
            { sku: "93050399", category: "袋子", name: "日燦袋", order: 22 },
            { sku: "93050399", category: "袋子", name: "杏鮑菇袋(裝大5用)", order: 23 },
            { sku: "93050399", category: "袋子", name: "香菇袋", order: 24 },
            { sku: "93050399", category: "袋子", name: "苔藍大袋", order: 25 },
            { sku: "93129999", category: "膠帶", name: "透明膠帶(寬)", order: 26 },
            { sku: "93129999", category: "膠帶", name: "紅色膠帶", order: 27 },
            { sku: "93129999", category: "膠帶", name: "蔬果膠帶", order: 28 },
            { sku: "93129999", category: "膠帶", name: "束口機膠帶-紅色", order: 29 },
            { sku: "93129999", category: "膠帶", name: "束口機膠帶-黃色", order: 30 },
            { sku: "93129999", category: "膠帶", name: "束口機膠帶-藍色", order: 31 },
            { sku: "93129999", category: "膠帶", name: "束口機膠帶-白色", order: 32 },
            { sku: "93129999", category: "膠帶", name: "束口機膠帶-綠色", order: 33 },
            { sku: "93050399", category: "膠帶", name: "透明膠帶(無痕)", order: 34 },
            { sku: "93129999", category: "文具", name: "油性原子筆", order: 35 },
            { sku: "93129999", category: "文具", name: "雄獅230R白板筆補充液", order: 36 },
            { sku: "93129999", category: "文具", name: "雄獅白板筆230", order: 37 },
            { sku: "94320799", category: "文具", name: "報表紙", order: 38 },
            { sku: "93129999", category: "文具", name: "美工刀", order: 39 },
            { sku: "93050399", category: "文具", name: "立可帶", order: 40 },
            { sku: "93050399", category: "文具", name: "立可帶補充", order: 41 },
            { sku: "93050399", category: "文具", name: "螢光筆", order: 42 },
            { sku: "93050399", category: "文具", name: "美工刀刀片", order: 43 },
            { sku: "93320201", category: "手套", name: "PVC手套XL", order: 44 },
            { sku: "93320201", category: "手套", name: "PVC手套L", order: 45 },
            { sku: "93320201", category: "手套", name: "PVC手套M", order: 46 },
            { sku: "93320201", category: "手套", name: "PVC手套S", order: 47 },
            { sku: "94320799", category: "其他", name: "拋棄式衛生帽", order: 48 },
            { sku: "94320799", category: "其他", name: "強諾抗菌洗手乳", order: 49 },
            { sku: "94320799", category: "其他", name: "圍裙", order: 50 },
            { sku: "94320799", category: "其他", name: "OK蹦(2.5CM*7.2CM)*2", order: 51 },
            { sku: "94320799", category: "其他", name: "OK蹦(5CM*7CM)*2", order: 52 },
            { sku: "93129999", category: "其他", name: "抹布", order: 53 },
            { sku: "94320799", category: "其他", name: "浴廁清潔劑", order: 54 }
        ];

        // 初始化
        async function init() {
            signInAnonymously(auth).catch(e => console.error(e));
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if(user) startSync();
            });
        }

        // 開始同步
        function startSync() {
            const inventoryRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
            onSnapshot(inventoryRef, (snapshot) => {
                items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                document.getElementById('syncStatus').innerText = '已同步';
                renderItems();
            }, (err) => {
                document.getElementById('syncStatus').innerText = '連線異常';
            });
        }

        // 渲染列表
        window.renderItems = function() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const listContainer = document.getElementById('inventoryList');
            const tabsContainer = document.getElementById('categoryTabs');
            
            // 處理分類標籤
            const cats = ['全部', ...new Set(items.map(i => i.category))].filter(Boolean);
            const otherIdx = cats.indexOf('其他');
            if (otherIdx > -1) {
                cats.splice(otherIdx, 1);
                cats.push('其他');
            }
            
            tabsContainer.innerHTML = cats.map(cat => `
                <button onclick="window.setCategory('${cat}')" class="px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${selectedCategory === cat ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-100'}">
                    ${cat}
                </button>
            `).join('');

            // 過濾並排序
            let filtered = items.filter(i => 
                (i.name + (i.sku || '') + (i.category || '')).toLowerCase().includes(search)
            );
            if (selectedCategory !== '全部') {
                filtered = filtered.filter(i => i.category === selectedCategory);
            }

            filtered.sort((a, b) => {
                const isAOther = a.category === '其他';
                const isBOther = b.category === '其他';
                if (isAOther && !isBOther) return 1;
                if (!isAOther && isBOther) return -1;
                return (a.order || 0) - (b.order || 0);
            });

            // 底部按鈕啟用狀態
            const hasActive = items.some(i => i.quantity > 0);
            const submitBtn = document.getElementById('submitBtn');
            if (hasActive) {
                submitBtn.classList.remove('bg-slate-200', 'text-slate-400', 'pointer-events-none');
                submitBtn.classList.add('bg-indigo-600', 'text-white', 'shadow-indigo-200');
            } else {
                submitBtn.classList.add('bg-slate-200', 'text-slate-400', 'pointer-events-none');
                submitBtn.classList.remove('bg-indigo-600', 'text-white', 'shadow-indigo-200');
            }

            if (filtered.length === 0) {
                listContainer.innerHTML = `<div class="py-20 text-center text-slate-400 text-xs italic">無相符資料</div>`;
                return;
            }

            listContainer.innerHTML = filtered.map(item => `
                <div class="bg-white rounded-2xl p-4 border transition-all flex items-center justify-between shadow-sm ${item.quantity > 0 ? 'border-indigo-400 bg-indigo-50/10 ring-1 ring-indigo-400/20' : 'border-slate-100'}">
                    <div class="flex-1 min-w-0 pr-4">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-mono font-bold">#${item.order || '0'}</span>
                            <span class="text-[10px] font-bold uppercase tracking-wider ${item.category === '其他' ? 'text-slate-400' : 'text-indigo-500'}">${item.sku || 'N/A'}</span>
                        </div>
                        <div class="font-bold text-slate-800 text-sm mb-1 truncate">${item.name}</div>
                        <div class="text-[10px] text-slate-400 font-medium flex items-center gap-1">
                            <i class="fas fa-filter text-[8px]"></i> ${item.category}
                        </div>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <div class="flex items-center bg-slate-50 rounded-xl border border-slate-200 p-0.5 shadow-inner">
                            <button onclick="window.updateQty('${item.id}', -1)" class="w-10 h-10 text-slate-400 font-bold hover:bg-white rounded-lg">-</button>
                            <span class="w-10 text-center font-black text-sm ${item.quantity > 0 ? 'text-indigo-600' : 'text-slate-300'}">${item.quantity || 0}</span>
                            <button onclick="window.updateQty('${item.id}', 1)" class="w-10 h-10 text-slate-400 font-bold hover:bg-white rounded-lg">+</button>
                        </div>
                        <button onclick="window.deleteItem('${item.id}')" class="p-2 text-slate-200 hover:text-red-400"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
        };

        // 操作方法
        window.setCategory = (cat) => {
            selectedCategory = cat;
            renderItems();
        };

        window.updateQty = async (id, delta) => {
            const item = items.find(i => i.id === id);
            const newQty = Math.max(0, (item.quantity || 0) + delta);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id), {
                quantity: newQty,
                updatedAt: new Date().toISOString()
            });
        };

        window.deleteItem = async (id) => {
            if (confirm('確定移除此品項？')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id));
            }
        };

        window.initializeItems = async () => {
            const inventoryRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
            const batch = writeBatch(db);
            const snapshot = await getDocs(inventoryRef);
            snapshot.docs.forEach(d => batch.delete(d.ref));
            INITIAL_ITEMS.forEach(item => {
                const newDoc = doc(inventoryRef);
                batch.set(newDoc, { ...item, quantity: 0, updatedAt: new Date().toISOString() });
            });
            await batch.commit();
            closeModal('resetConfirmModal');
        };

        window.clearAllItems = async () => {
            const inventoryRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
            const batch = writeBatch(db);
            const snapshot = await getDocs(inventoryRef);
            snapshot.docs.forEach(d => batch.delete(d.ref));
            await batch.commit();
            closeModal('resetConfirmModal');
        };

        window.handleAddItem = async () => {
            const name = document.getElementById('new_name').value;
            const sku = document.getElementById('new_sku').value;
            const cat = document.getElementById('new_cat').value;
            if(!name) return alert('品名必填');
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), {
                name, sku, category: cat || '未分類', 
                quantity: 0, order: items.length + 1,
                updatedAt: new Date().toISOString()
            });
            closeModal('addItemModal');
            document.getElementById('new_name').value = '';
        };

        window.handleSubmitInventory = async () => {
            const active = items.filter(i => i.quantity > 0);
            const batch = writeBatch(db);
            const historyRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
            
            await addDoc(historyRef, {
                submitAt: new Date().toISOString(),
                details: active.map(i => ({ name: i.name, qty: i.quantity, sku: i.sku })),
                user: currentUser.uid
            });

            active.forEach(i => {
                batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', i.id), { quantity: 0 });
            });

            await batch.commit();
            closeModal('submitConfirmModal');
        };

        window.handleExportExcel = () => {
            const exportData = items.map(item => ({
                '序號': item.order,
                '編碼': item.sku,
                '類別': item.category,
                '品項名稱': item.name,
                '盤點數量': item.quantity || 0
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "盤點報表");
            XLSX.writeFile(wb, `盤點紀錄_${new Date().getTime()}.xlsx`);
        };

        window.handleSubmitConfirm = () => {
            const active = items.filter(i => i.quantity > 0);
            const preview = document.getElementById('submitPreviewList');
            preview.innerHTML = active.map(i => `
                <div class="flex justify-between items-center text-xs bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <span class="font-bold text-slate-700 truncate pr-2">${i.name}</span>
                    <span class="font-black text-indigo-600 shrink-0">x ${i.quantity}</span>
                </div>
            `).join('');
            showModal('submitConfirmModal');
        };

        // 彈窗與輔助
        window.showModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.hideError = () => document.getElementById('errorBanner').classList.add('hidden');

        init();
    </script>
</body>
</html>
