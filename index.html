<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手工線排班系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 假別顏色定義 */
        .bg-manual-off { background-color: #7c3aed !important; color: white; } /* 指定假: 紫色 */
        .bg-auto-off { background-color: #3b82f6 !important; color: white; }   /* 系統假: 藍色 */
        .bg-special-off { background-color: #f59e0b !important; color: white; } /* 特休: 橘色 */
        .bg-sun-off { background-color: #fef2f2 !important; color: #ef4444; border: 1px solid #fee2e2; } /* 店休: 粉紅 */
        
        .text-work { color: #e2e8f0; } /* 上班字體顏色 (淡灰色) */
        .target-met-row { background-color: #f0fdf4 !important; }
        .warning-row { background-color: #fffaf0 !important; }
        .bg-stats-row { background-color: #f8fafc; font-weight: 800; color: #475569; }
        .cell-transition { transition: all 0.1s ease; }
    </style>
</head>
<body class="bg-slate-50 p-4 text-slate-800 text-sm">
    <div id="app" class="max-w-[1600px] mx-auto space-y-4">
        
        <!-- 控制面板 -->
        <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 space-y-4">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <span class="text-blue-500 font-bold">📅 設定期間：</span>
                        <div class="flex bg-slate-100 rounded-lg p-1 font-bold shadow-inner text-base">
                            <input type="number" id="yearInput" onchange="renderTable()" class="w-20 bg-transparent text-center outline-none" value="2026">
                            <span class="text-slate-400 px-1">/</span>
                            <input type="number" id="monthInput" onchange="renderTable()" min="1" max="12" class="w-12 bg-transparent text-center outline-none" value="5">
                        </div>
                    </div>
                    <div class="flex items-center gap-2 border-l pl-6 border-slate-200">
                        <span class="text-slate-500 font-medium">月休目標天數 (含週日):</span>
                        <input type="number" id="targetOffInput" onchange="renderTable()" class="w-16 bg-blue-50 border border-blue-100 rounded-lg py-1 text-center font-bold text-blue-600 outline-none focus:ring-2 focus:ring-blue-400" value="8">
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="generateSchedule()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl flex items-center gap-2 font-bold shadow-lg transition-all active:scale-95">
                        🎲 隨機自動排班 (至少3人上班)
                    </button>
                    <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-xl flex items-center gap-2 font-bold shadow-lg transition-all active:scale-95">
                        📊 匯出 Excel
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-4">
            <!-- 側邊欄：人員管理與匯入 -->
            <div class="xl:col-span-1 space-y-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="font-bold text-slate-600 mb-3 flex items-center gap-2 border-b pb-2 text-base">👥 人員管理</h2>
                    <div id="staffListContainer" class="space-y-1 mb-4 max-h-[300px] overflow-y-auto custom-scrollbar"></div>
                    <div class="flex gap-2 pt-3 border-t border-slate-100">
                        <input type="text" id="newStaffName" placeholder="輸入姓名" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 outline-none text-xs focus:ring-2 focus:ring-indigo-400 focus:bg-white transition-all">
                        <button onclick="addStaff()" class="bg-slate-800 text-white px-4 rounded-lg font-bold hover:bg-slate-700 transition-colors">+</button>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="font-bold mb-2 text-slate-600 text-base">📋 批次假位匯入</h2>
                    <textarea id="importText" rows="8" placeholder="貼上文字，例如：陳惠芬 5/1 5/10 特休 5/20..." class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-[12px] outline-none mb-3 font-mono focus:bg-white transition-all resize-none"></textarea>
                    <button onclick="handleImport()" class="w-full bg-indigo-600 text-white hover:bg-indigo-700 py-2.5 rounded-lg text-xs font-bold transition-colors shadow-md mb-2">執行辨識並匯入</button>
                    <button onclick="clearAllSchedule()" class="w-full bg-slate-100 text-slate-500 hover:bg-slate-200 py-1.5 rounded-lg text-[11px] font-bold transition-colors border border-slate-200">清空所有排班資料</button>
                </div>
            </div>

            <!-- 主表格區域 -->
            <div class="xl:col-span-3 overflow-hidden flex flex-col">
                <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto custom-scrollbar">
                        <table id="scheduleTable" class="w-full text-xs border-collapse">
                            <!-- JS 動態生成內容 -->
                        </table>
                    </div>
                    
                    <!-- 假別圖例 (放置於上班人數下方) -->
                    <div id="legendContainer" class="p-4 bg-slate-50 border-t border-slate-200 flex flex-wrap items-center gap-6">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">假別圖例:</span>
                        <div class="flex items-center gap-1.5">
                            <div class="w-4 h-4 rounded bg-manual-off"></div>
                            <span class="text-xs">指定假/匯入假</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <div class="w-4 h-4 rounded bg-auto-off"></div>
                            <span class="text-xs">系統隨機假</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <div class="w-4 h-4 rounded bg-special-off"></div>
                            <span class="text-xs">特休</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <div class="w-4 h-4 rounded bg-sun-off border border-red-100"></div>
                            <span class="text-xs text-red-500">週日店休 (計入總休)</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始人員名單
        let staffList = [
            { id: 1, name: '陳惠芬', lastMonthWork: 0 },
            { id: 2, name: '許麗呅', lastMonthWork: 0 },
            { id: 3, name: '陳昱蓉', lastMonthWork: 0 },
            { id: 4, name: '戴文雅', lastMonthWork: 0 }
        ];
        
        // 儲存排班資料：{ staffId: { day: 'work' | 'manual-off' | 'auto-off' | 'special' } }
        let schedule = {}; 

        const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
        const getWeekday = (y, m, d) => new Date(y, m - 1, d).getDay();

        // 渲染人員列表
        function renderStaffList() {
            const container = document.getElementById('staffListContainer');
            container.innerHTML = staffList.map(s => `
                <div class="flex items-center justify-between p-2.5 hover:bg-slate-50 rounded-lg border border-transparent hover:border-slate-200 group">
                    <span class="font-bold text-slate-700">${s.name}</span>
                    <div class="flex items-center gap-3 text-[10px]">
                        <span class="text-slate-400 font-medium">上月連勤:</span>
                        <input type="number" value="${s.lastMonthWork}" 
                            onchange="updateLastMonthWork(${s.id}, this.value)"
                            class="w-10 bg-white border border-slate-200 rounded px-1 py-1 text-center font-bold outline-none focus:border-indigo-400" min="0" max="6">
                        <button onclick="removeStaff(${s.id})" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity px-1">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function updateLastMonthWork(id, value) {
            const staff = staffList.find(s => s.id === id);
            if (staff) staff.lastMonthWork = parseInt(value) || 0;
            renderTable();
        }

        function addStaff() {
            const name = document.getElementById('newStaffName').value.trim();
            if (!name) return;
            staffList.push({ id: Date.now(), name, lastMonthWork: 0 });
            document.getElementById('newStaffName').value = '';
            renderStaffList();
            renderTable();
        }

        function removeStaff(id) {
            if (staffList.length <= 1) return;
            staffList = staffList.filter(s => s.id !== id);
            renderTable();
            renderStaffList();
        }

        function clearAllSchedule() {
            schedule = {};
            renderTable();
        }

        // 批次解析文字匯入假位
        function handleImport() {
            const text = document.getElementById('importText').value;
            const year = parseInt(document.getElementById('yearInput').value);
            const month = parseInt(document.getElementById('monthInput').value);
            const total = daysInMonth(year, month);
            
            let positions = [];
            staffList.forEach(s => {
                let idx = text.indexOf(s.name);
                while (idx !== -1) {
                    positions.push({ id: s.id, name: s.name, index: idx });
                    idx = text.indexOf(s.name, idx + 1);
                }
            });
            positions.sort((a, b) => a.index - b.index);

            for (let i = 0; i < positions.length; i++) {
                const current = positions[i];
                const segmentEnd = positions[i + 1] ? positions[i + 1].index : text.length;
                const segment = text.substring(current.index, segmentEnd);
                
                if (!schedule[current.id]) schedule[current.id] = {};
                const cleanedSegment = segment.replace(/\b\d{4}\b/g, '');
                const subSegments = cleanedSegment.split(/(特休)/);
                let currentMode = 'manual-off';

                subSegments.forEach(sub => {
                    if (sub === '特休') {
                        currentMode = 'special';
                        return;
                    }
                    const dateMatches = sub.match(/\d+[\/\.]\d+|\d+/g);
                    if (dateMatches) {
                        dateMatches.forEach(match => {
                            let d = 0;
                            if (match.includes('/') || match.includes('.')) {
                                const parts = match.split(/[\/\.]/);
                                if (parseInt(parts[0]) === month) d = parseInt(parts[1]);
                            } else {
                                d = parseInt(match);
                            }
                            if (d >= 1 && d <= total) {
                                schedule[current.id][d] = currentMode;
                            }
                        });
                    }
                });
            }
            document.getElementById('importText').value = '';
            renderTable();
        }

        // 手動切換單格狀態
        function toggleCell(staffId, day, weekday) {
            if (weekday === 0) return; 
            if (!schedule[staffId]) schedule[staffId] = {};
            const current = schedule[staffId][day] || 'work';
            let next = 'work';
            
            if (current === 'work') next = 'auto-off';
            else if (current === 'auto-off') next = 'manual-off';
            else if (current === 'manual-off') next = 'special';
            else if (current === 'special') next = 'work';
            
            schedule[staffId][day] = next;
            renderTable();
        }

        // 自動排假核心邏輯
        function generateSchedule() {
            const year = parseInt(document.getElementById('yearInput').value);
            const month = parseInt(document.getElementById('monthInput').value);
            const targetOff = parseInt(document.getElementById('targetOffInput').value) || 8;
            const totalDays = daysInMonth(year, month);
            
            const newSchedule = {};
            const stats = {};

            // 1. 初始化背景 (週日、手動、特休優先保留)
            staffList.forEach(s => {
                newSchedule[s.id] = {};
                stats[s.id] = { consecutiveWork: s.lastMonthWork, totalOffCount: 0 };
                for (let d = 1; d <= totalDays; d++) {
                    const wk = getWeekday(year, month, d);
                    if (wk === 0) {
                        newSchedule[s.id][d] = 'auto-off'; // 店休計入系統假
                        stats[s.id].totalOffCount++;
                    } else if (schedule[s.id]?.[d] === 'manual-off' || schedule[s.id]?.[d] === 'special') {
                        const type = schedule[s.id][d];
                        newSchedule[s.id][d] = type;
                        if (type === 'manual-off') stats[s.id].totalOffCount++;
                    }
                }
            });

            const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

            // 2. 逐日分配隨機假
            for (let d = 1; d <= totalDays; d++) {
                const wk = getWeekday(year, month, d);
                if (wk === 0) {
                    staffList.forEach(s => { stats[s.id].consecutiveWork = 0; });
                    continue;
                }

                const candidates = shuffle(staffList);
                candidates.forEach(s => {
                    if (newSchedule[s.id][d]) {
                        stats[s.id].consecutiveWork = 0;
                        return;
                    }

                    // 檢查「至少3人上班」規則
                    const currentOffToday = staffList.filter(p => newSchedule[p.id][d] && newSchedule[p.id][d] !== 'work').length;
                    const remainingIfOff = staffList.length - currentOffToday - 1;

                    const mustRest = stats[s.id].consecutiveWork >= 5; 
                    const canRest = stats[s.id].totalOffCount < targetOff;
                    const isMinStaffMet = remainingIfOff >= 3;

                    // 特定夥伴避假 (陳惠芬與許麗呅儘量不一起休)
                    let partnerConflict = false;
                    if (s.name === '陳惠芬' || s.name === '許麗呅') {
                        const pName = (s.name === '陳惠芬' ? '許麗呅' : '陳惠芬');
                        const partner = staffList.find(p => p.name === pName);
                        if (partner && newSchedule[partner.id]?.[d] && newSchedule[partner.id][d] !== 'work') partnerConflict = true;
                    }

                    // 決定放假邏輯
                    if ((mustRest || (canRest && Math.random() > 0.4)) && (isMinStaffMet || mustRest) && !partnerConflict) {
                        newSchedule[s.id][d] = 'auto-off';
                        stats[s.id].totalOffCount++;
                        stats[s.id].consecutiveWork = 0;
                    } else {
                        newSchedule[s.id][d] = 'work';
                        stats[s.id].consecutiveWork++;
                    }
                });
            }

            // 3. 補天數修正：確保每人天數精確符合目標
            staffList.forEach(s => {
                // 如果放太多，隨機拔掉 (不能拔週日)
                while (stats[s.id].totalOffCount > targetOff) {
                    const removable = Object.keys(newSchedule[s.id]).filter(d => 
                        newSchedule[s.id][d] === 'auto-off' && getWeekday(year, month, parseInt(d)) !== 0
                    );
                    if (removable.length === 0) break;
                    const d = removable[Math.floor(Math.random() * removable.length)];
                    newSchedule[s.id][d] = 'work';
                    stats[s.id].totalOffCount--;
                }

                // 如果放太少，補足假位 (必須符合 3 人上班限制)
                let safety = 0;
                while (stats[s.id].totalOffCount < targetOff && safety < 500) {
                    safety++;
                    const d = Math.floor(Math.random() * totalDays) + 1;
                    const wk = getWeekday(year, month, d);
                    if (wk === 0 || newSchedule[s.id][d] !== 'work') continue;

                    const offToday = staffList.filter(p => newSchedule[p.id][d] !== 'work').length;
                    if (staffList.length - offToday - 1 < 3) continue;

                    newSchedule[s.id][d] = 'auto-off';
                    stats[s.id].totalOffCount++;
                }
            });

            schedule = newSchedule;
            renderTable();
        }

        // 繪製排班表格
        function renderTable() {
            const year = parseInt(document.getElementById('yearInput').value);
            const month = parseInt(document.getElementById('monthInput').value);
            const targetOff = parseInt(document.getElementById('targetOffInput').value) || 8;
            const totalDays = daysInMonth(year, month);
            const table = document.getElementById('scheduleTable');
            const dailyWorkCount = new Array(totalDays + 1).fill(0);

            // 表頭生成
            let html = `<thead><tr class="bg-slate-100 text-slate-500 border-b">
                <th class="p-4 sticky-col border-r w-32 text-center bg-slate-100 font-bold">人員</th>`;
            for (let d = 1; d <= totalDays; d++) {
                const wk = getWeekday(year, month, d);
                html += `<th class="p-1 min-w-[38px] text-center ${wk === 0 ? 'bg-red-50 text-red-500 font-black' : 'font-medium'}">${d}</th>`;
            }
            html += `<th class="p-2 border-l text-center font-bold text-blue-600">休</th><th class="p-2 border-l text-center font-bold text-amber-600">特</th><th class="p-2 border-l bg-slate-200 text-center font-bold">總計</th></tr></thead><tbody>`;

            // 資料列生成
            staffList.forEach(s => {
                let totalOff = 0, sp = 0;
                for (let d = 1; d <= totalDays; d++) {
                    const type = schedule[s.id]?.[d] || 'work';
                    const wk = getWeekday(year, month, d);
                    if (type === 'special') sp++;
                    else if (type === 'manual-off' || type === 'auto-off' || wk === 0) {
                        totalOff++; 
                    }
                    if (type === 'work' && wk !== 0) dailyWorkCount[d]++;
                }
                
                const isTargetMet = totalOff === targetOff;
                const rowClass = isTargetMet ? 'target-met-row' : 'warning-row';

                html += `<tr class="${rowClass} border-b hover:brightness-95 cell-transition">
                    <td class="p-3 border-r sticky-col font-bold text-center bg-inherit">${s.name}</td>`;
                
                for (let d = 1; d <= totalDays; d++) {
                    const wk = getWeekday(year, month, d);
                    const type = schedule[s.id]?.[d] || 'work';
                    let display = "正", cls = "text-center h-12 border-r cell-transition cursor-pointer font-black text-sm ";
                    
                    if (wk === 0) { display = "休"; cls += "bg-sun-off cursor-not-allowed"; }
                    else if (type === 'manual-off') { display = "休"; cls += "bg-manual-off"; }
                    else if (type === 'auto-off') { display = "休"; cls += "bg-auto-off"; }
                    else if (type === 'special') { display = "特"; cls += "bg-special-off"; }
                    else { cls += "text-work"; }

                    html += `<td onclick="toggleCell(${s.id}, ${d}, ${wk})" class="${cls}">${display}</td>`;
                }

                const offColor = (totalOff > targetOff) ? 'text-red-500' : (totalOff < targetOff ? 'text-slate-400' : 'text-blue-700');
                html += `<td class="p-2 text-center ${offColor} font-black border-l">${totalOff}</td>
                         <td class="p-2 text-center text-amber-600 font-black border-l">${sp}</td>
                         <td class="p-2 text-center font-black bg-slate-100 border-l">${totalOff + sp}</td></tr>`;
            });

            // 底部上班人數統計列
            html += `<tr class="bg-stats-row border-t-2 border-slate-300">
                <td class="p-3 border-r sticky-col font-bold text-center bg-inherit">上班人數</td>`;
            for (let d = 1; d <= totalDays; d++) {
                const wk = getWeekday(year, month, d);
                const count = dailyWorkCount[d];
                // 低於 3 人會以紅色標記
                const countCls = (wk !== 0 && count < 3) ? 'text-red-600 font-extrabold' : 'text-slate-600';
                html += `<td class="p-1 text-center font-black text-xs ${countCls}">${wk === 0 ? '-' : count}</td>`;
            }
            html += `<td colspan="3" class="bg-slate-200"></td></tr></tbody>`;
            table.innerHTML = html;
        }

        // 匯出 Excel
        function exportToExcel() {
            const year = document.getElementById('yearInput').value;
            const month = document.getElementById('monthInput').value;
            const totalDays = daysInMonth(year, month);
            const data = [
                [`${year}年 ${month}月 員工排班表 (每日至少3人上班)`],
                ["姓名", ...Array.from({length: totalDays}, (_, i) => i + 1), "總休假", "特休天數", "總計"]
            ];

            staffList.forEach(s => {
                const row = [s.name];
                let totalOff = 0, sp = 0;
                for (let d = 1; d <= totalDays; d++) {
                    const wk = getWeekday(year, month, d);
                    const type = (wk === 0) ? 'auto-off' : (schedule[s.id]?.[d] || 'work');
                    if (type === 'special') { row.push("特休"); sp++; }
                    else if (type !== 'work' || wk === 0) { row.push("休"); totalOff++; }
                    else { row.push("正"); }
                }
                row.push(totalOff, sp, totalOff + sp);
                data.push(row);
            });

            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "班表");
            XLSX.writeFile(wb, `${year}年${month}月_排班表.xlsx`);
        }

        window.onload = () => {
            renderStaffList();
            renderTable();
        };
    </script>
</body>
</html>
