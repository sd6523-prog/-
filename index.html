<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 採購單精密辨識系統 (穩定修復版 V4.5)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .loading-spinner { border: 2px solid #f3f3f3; border-top: 2px solid #3b82f6; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .drop-zone.active { border-color: #3b82f6; background-color: #eff6ff; transform: translateY(-2px); }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .status-badge { @apply px-2 py-0.5 rounded-full text-[10px] font-bold uppercase; }
        .status-matched { @apply bg-green-100 text-green-700; }
        .status-partial { @apply bg-amber-100 text-amber-700; }
        .status-failed { @apply bg-red-100 text-red-700; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen text-slate-900 antialiased">
    <div class="max-w-[1600px] mx-auto p-4 lg:p-8">
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-3 rounded-xl shadow-lg shadow-blue-200">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">AI 採購單精密辨識系統 <span class="text-blue-600">V4.5</span></h1>
                    <div class="flex items-center gap-3 mt-1">
                        <span class="flex items-center text-xs font-medium text-slate-500">
                            <span class="w-2 h-2 bg-green-500 rounded-full mr-1.5 animate-pulse"></span> 通訊協定：穩定
                        </span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button id="testApiBtn" class="px-5 py-2.5 rounded-xl text-sm font-semibold text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 transition-all flex items-center gap-2">
                    <span id="testApiIcon">🔑</span>
                    <span id="testApiLabel">API 測試</span>
                </button>
                <button id="clearAllBtn" class="px-5 py-2.5 rounded-xl text-sm font-semibold text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 transition-all">清除全部</button>
                <button id="exportBtn" class="px-6 py-2.5 rounded-xl text-sm font-bold text-white bg-green-600 hover:bg-green-700 shadow-lg shadow-green-100 transition-all hidden flex items-center gap-2">匯出 ERP 格式</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-sm font-bold text-slate-800 uppercase mb-4 flex items-center">
                        <span class="bg-slate-100 text-slate-600 w-6 h-6 rounded-lg flex items-center justify-center mr-2 text-xs">01</span>
                        對照表 (Excel)
                    </h2>
                    <input type="file" id="mappingFile" accept=".xlsx, .xls, .csv" class="hidden">
                    <label for="mappingFile" class="flex flex-col items-center justify-center w-full py-4 px-4 border-2 border-slate-100 border-dashed rounded-xl cursor-pointer hover:bg-blue-50 transition-all">
                        <span class="text-xs font-bold text-blue-600">選擇對照表檔案</span>
                        <span id="statusMapping" class="mt-1 text-[10px] text-slate-400 font-mono">尚未載入資料</span>
                    </label>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-sm font-bold text-slate-800 uppercase mb-4 flex items-center">
                        <span class="bg-slate-100 text-slate-600 w-6 h-6 rounded-lg flex items-center justify-center mr-2 text-xs">02</span>
                        採購單 (PDF/圖片)
                    </h2>
                    <div id="dropZone" class="drop-zone rounded-2xl p-8 text-center cursor-pointer">
                        <input type="file" id="orderFiles" accept="image/*, application/pdf" multiple class="hidden">
                        <p class="text-xs font-bold text-slate-700">拖放或點擊上傳</p>
                        <p class="text-[10px] text-slate-400 mt-1">支持多檔辨識</p>
                    </div>
                    <div id="queueContainer" class="mt-6 space-y-2 hidden max-h-[300px] overflow-y-auto custom-scrollbar">
                        <div id="fileList" class="space-y-2"></div>
                    </div>
                    <button id="processBtn" class="w-full mt-6 bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 disabled:bg-slate-100 disabled:text-slate-400 transition-all shadow-lg shadow-blue-100 active:scale-95" disabled>開始智慧辨識</button>
                </div>
            </div>

            <div class="lg:col-span-9">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col min-h-[650px] relative">
                    <div id="statsBar" class="hidden px-6 py-3 bg-slate-50 border-b border-slate-100 flex items-center gap-6 text-[11px] font-bold">
                        <span class="text-slate-500">總計：<span id="statTotal" class="text-slate-800 ml-1">0</span></span>
                        <span class="text-green-600">自動比對：<span id="statSuccess" class="ml-1">0</span></span>
                    </div>

                    <div id="emptyState" class="flex-grow flex flex-col items-center justify-center text-center p-12">
                        <p class="text-slate-400 text-sm">暫無數據，請先上傳檔案並開始辨識</p>
                        <div id="errorMsgBox" class="mt-6 text-[11px] text-red-500 bg-red-50 px-6 py-4 rounded-xl border border-red-100 hidden max-w-xl text-left leading-relaxed"></div>
                    </div>

                    <div id="tableWrapper" class="hidden overflow-auto flex-grow custom-scrollbar">
                        <table class="w-full text-left text-[12px] border-separate border-spacing-0">
                            <thead>
                                <tr class="bg-slate-50 sticky top-0 z-10">
                                    <th class="p-4 font-bold text-slate-500 border-b">客戶編號</th>
                                    <th class="p-4 font-bold text-slate-500 border-b">客戶名稱</th>
                                    <th class="p-4 font-bold text-slate-500 border-b">訂貨日期</th>
                                    <th class="p-4 font-bold text-slate-500 border-b">交貨日期</th>
                                    <th class="p-4 font-bold text-slate-500 border-b">訂單編號</th>
                                    <th class="p-4 font-bold text-slate-500 border-b">品項代號</th>
                                    <th class="p-4 font-bold text-blue-700 border-b">客戶品項名稱</th>
                                    <th class="p-4 font-bold text-slate-500 border-b">品項名稱</th>
                                    <th class="p-4 font-bold text-slate-500 border-b">規格單位代號</th>
                                    <th class="p-4 font-bold text-slate-500 border-b">規格單位</th>
                                    <th class="p-4 font-bold text-slate-500 border-b text-right">數量</th>
                                </tr>
                            </thead>
                            <tbody id="resultBody" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化參數
        const apiKey = "AIzaSyClNoGDiOD6-GIhQahhQQZrb-IeqIKZAjQ"; 
        let masterMap = []; 
        let allResults = [];
        let pendingFiles = [];
        let fuse = null;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('orderFiles');
        const emptyState = document.getElementById('emptyState');
        const tableWrapper = document.getElementById('tableWrapper');
        const exportBtn = document.getElementById('exportBtn');
        const processBtn = document.getElementById('processBtn');
        const fileList = document.getElementById('fileList');
        const queueContainer = document.getElementById('queueContainer');
        const errorMsgBox = document.getElementById('errorMsgBox');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('active');
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('active'); handleFiles(e.dataTransfer.files); };
        fileInput.onchange = (e) => handleFiles(e.target.files);

        document.getElementById('clearAllBtn').onclick = () => {
            allResults = []; pendingFiles = []; fileList.innerHTML = "";
            queueContainer.classList.add('hidden'); errorMsgBox.classList.add('hidden');
            emptyState.classList.remove('hidden'); tableWrapper.classList.add('hidden');
            exportBtn.classList.add('hidden'); processBtn.disabled = true;
        };

        function handleFiles(files) {
            Array.from(files).forEach(f => {
                pendingFiles.push({ id: crypto.randomUUID(), file: f, status: 'ready', error: null });
            });
            if (pendingFiles.length > 0) {
                queueContainer.classList.remove('hidden');
                renderQueue();
                processBtn.disabled = false;
            }
        }

        function renderQueue() {
            fileList.innerHTML = pendingFiles.map(i => {
                let icon = i.status === 'loading' ? '<span class="loading-spinner"></span>' : (i.status === 'done' ? '✅' : (i.status === 'error' ? '❌' : '⏳'));
                return `<div class="flex items-center justify-between p-3 rounded-xl border bg-slate-50 text-[10px] font-medium">
                    <span class="truncate w-40">${i.file.name}</span>
                    <span>${icon}</span>
                </div>`;
            }).join('');
        }

        document.getElementById('mappingFile').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                masterMap = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                fuse = new Fuse(masterMap, { keys: ['客戶商品名稱', 'ERP品項名稱', 'A欄'], threshold: 0.4 });
                document.getElementById('statusMapping').innerText = `已載入 ${masterMap.length} 筆資料`;
            };
            reader.readAsArrayBuffer(file);
        };

        processBtn.onclick = async () => {
            processBtn.disabled = true;
            errorMsgBox.classList.add('hidden');
            
            // 優先使用注入的金鑰，否則使用頁面內的 apiKey
            const activeKey = (typeof __api_key !== 'undefined' && __api_key) ? __api_key : apiKey;

            // API Key 空白時提前攔截
            if (!activeKey || activeKey.trim() === '') {
                errorMsgBox.innerHTML = `
                    <div class="font-bold text-red-600 mb-2">未設定 API Key</div>
                    <div class="space-y-1">
                        <p>• 請在程式碼第 118 行的 <code>const apiKey = ""</code> 中填入您的 Gemini API Key。</p>
                        <p>• 可至 <a href="https://aistudio.google.com/apikey" target="_blank" class="underline text-blue-600">Google AI Studio</a> 免費取得金鑰。</p>
                    </div>
                `;
                errorMsgBox.classList.remove('hidden');
                processBtn.disabled = false;
                return;
            }

            for(let item of pendingFiles) {
                if(item.status === 'done') continue;
                item.status = 'loading';
                renderQueue();
                
                try {
                    const b64 = await fileToBase64(item.file);
                    // 切換至核心預測路徑與穩定模型
                    const aiData = await callGeminiWithHighStability(b64, activeKey);
                    if (aiData) allResults.push(...processAILogic(aiData));
                    item.status = 'done';
                } catch(e) {
                    item.status = 'error';
                    errorMsgBox.innerHTML = `
                        <div class="font-bold text-red-600 mb-2">系統偵測到通訊障礙 (403/Forbidden)</div>
                        <div class="space-y-1">
                            <p>• 錯誤詳情：${e.message}</p>
                            <p>• 可能原因：當前預覽環境的金鑰暫時失效，或模型訪問頻率過高。</p>
                            <p class="mt-2 font-semibold">• 建議對策：請點擊右下角「重新整理」按鈕，這通常能重新獲取授權。</p>
                        </div>
                    `;
                    errorMsgBox.classList.remove('hidden');
                    break; 
                }
                renderQueue();
                renderTable();
            }
            if(allResults.length > 0) exportBtn.classList.remove('hidden');
            processBtn.disabled = false;
        };

        async function fileToBase64(file) {
            if (file.type === "application/pdf") {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 }); 
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            }
            return new Promise(r => {
                const rd = new FileReader();
                rd.onload = () => r(rd.result.split(',')[1]);
                rd.readAsDataURL(file);
            });
        }

        // 使用高穩定性請求格式 (符合 Google AI SDK 的標準通訊)
        async function callGeminiWithHighStability(base64, key, attempt = 0) {
            const maxAttempts = 3;
            const delays = [1000, 2000, 4000];
            
            // 使用當前穩定模型 (gemini-2.5-flash，2026/6 前有效)
            const modelName = "gemini-2.5-flash";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`;
            
            const payload = {
                contents: [{
                    parts: [
                        { text: "提取採購單資料並回傳 JSON：{\"order_no\":\"\",\"order_date\":\"\",\"delivery_date\":\"\",\"purchase_unit\":\"\",\"items\":[{\"name\":\"\",\"qty\":0,\"unit\":\"\"}]}\n訂貨日期為檔案左上角列印日期；到貨日期為檔案右上角的到貨日期。請直接回傳純 JSON，不要附加說明文字。" },
                        { inlineData: { mimeType: "image/jpeg", data: base64 } }
                    ]
                }],
                generationConfig: {
                    responseMimeType: "application/json",
                    temperature: 0.1
                }
            };

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.status === 403) {
                    throw new Error("HTTP 403: 存取被拒絕。這通常表示 API Key 與所選模型的組合在當前環境受限。");
                }

                if (!res.ok) {
                    const errorJson = await res.json().catch(() => ({}));
                    const errMsg = errorJson.error?.message || `狀態碼 ${res.status}`;
                    if (attempt < maxAttempts - 1) {
                        await new Promise(r => setTimeout(r, delays[attempt]));
                        return callGeminiWithHighStability(base64, key, attempt + 1);
                    }
                    throw new Error(`連線失敗：${errMsg}`);
                }

                const data = await res.json();
                const content = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!content) throw new Error("AI 回傳格式不符合預期 (Empty response)");
                
                return JSON.parse(content);
            } catch (err) {
                if (attempt < maxAttempts - 1 && !err.message.includes("403")) {
                    await new Promise(r => setTimeout(r, delays[attempt]));
                    return callGeminiWithHighStability(base64, key, attempt + 1);
                }
                throw err;
            }
        }

        function toAD(s) {
            if (!s) return "";
            const text = String(s).trim();
            const m = text.match(/(\d{2,4})[\/-](\d{1,2})[\/-](\d{1,2})/);
            if (!m) return text;
            let year = parseInt(m[1], 10);
            const month = String(m[2]).padStart(2, '0');
            const day = String(m[3]).padStart(2, '0');
            if (year < 1900) year += 1911;
            return `${year}/${month}/${day}`;
        }

        function processAILogic(ai) {
            const isFG10 = (ai.purchase_unit || "").includes("10") || (ai.purchase_unit || "").includes("食材");
            const cid = isFG10 ? "C310043" : "C310042";
            const cname = isFG10 ? "玉美生技股份有限公司(食材)" : "玉美生技股份有限公司(供食工場)";
            const orderDate = toAD(ai.order_date || ai.print_date || ai.purchase_date || ai.printed_date || "");
            const deliveryDate = toAD(ai.delivery_date || ai.deliver_date || ai.ship_date || "");

            return ai.items.map(it => {
                let res = {
                    '_status': 'failed', '客戶編號': cid, '客戶名稱': cname,
                    '訂貨日期': orderDate,
                    '交貨日期': deliveryDate,
                    '訂單編號': ai.order_no || "",
                    '品項代號': 'NULL', '客戶品項名稱': it.name || "",
                    '品項名稱': '未比對成功', '規格單位代號': '', '規格單位': it.unit || "", '數量': it.qty || 0
                };
                if (fuse && it.name) {
                    const found = fuse.search(it.name);
                    if (found.length > 0) {
                        const m = found[0].item;
                        res['品項代號'] = m['ERP品項代號'] || m['B欄'] || 'NULL';
                        res['品項名稱'] = m['ERP品項名稱'] || m['C欄'] || '未比對成功';
                        res['規格單位代號'] = m['規代'] || m['E欄'] || '';
                        res['規格單位'] = m['單位'] || m['F欄'] || it.unit;
                        res['_status'] = found[0].score < 0.15 ? 'matched' : 'partial';
                    }
                }
                return res;
            });
        }

        function renderTable() {
            if (allResults.length === 0) return;
            emptyState.classList.add('hidden');
            tableWrapper.classList.remove('hidden');
            document.getElementById('resultBody').innerHTML = allResults.map(r => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 text-slate-500">${r['客戶編號']}</td>
                    <td class="p-4">${r['客戶名稱']}</td>
                    <td class="p-4">${r['訂貨日期']}</td>
                    <td class="p-4">${r['交貨日期']}</td>
                    <td class="p-4 font-mono text-[11px]">${r['訂單編號']}</td>
                    <td class="p-4 font-bold text-blue-600">${r['品項代號']}</td>
                    <td class="p-4 font-bold text-slate-800">${r['客戶品項名稱']}</td>
                    <td class="p-4">${r['品項名稱']}</td>
                    <td class="p-4">${r['規格單位代號'] || ''}</td>
                    <td class="p-4">${r['規格單位']}</td>
                    <td class="p-4 text-right font-black">${r['數量']}</td>
                </tr>
            `).join('');
            
            document.getElementById('statsBar').classList.remove('hidden');
            document.getElementById('statTotal').innerText = allResults.length;
            document.getElementById('statSuccess').innerText = allResults.filter(r => r._status === 'matched').length;
        }

        exportBtn.onclick = () => {
            const clean = allResults.map(({_status, ...rest}) => ({
                '客戶編號': rest['客戶編號'] || '',
                '客戶名稱': rest['客戶名稱'] || '',
                '訂貨日期': rest['訂貨日期'] || '',
                '交貨日期': rest['交貨日期'] || '',
                '訂單編號': rest['訂單編號'] || '',
                '品項代號': rest['品項代號'] || '',
                '客戶品項名稱': rest['客戶品項名稱'] || '',
                '品項名稱': rest['品項名稱'] || '',
                '規格單位代號': rest['規格單位代號'] || '',
                '規格單位': rest['規格單位'] || '',
                '數量': Number(rest['數量']) || 0
            }));
            const ws = XLSX.utils.json_to_sheet(clean);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "ERP_DATA");
            XLSX.writeFile(wb, `玉美匯出_${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        document.getElementById('testApiBtn').onclick = async () => {
            const btn = document.getElementById('testApiBtn');
            const icon = document.getElementById('testApiIcon');
            const label = document.getElementById('testApiLabel');
            const activeKey = (typeof __api_key !== 'undefined' && __api_key) ? __api_key : apiKey;

            if (!activeKey || activeKey.trim() === '') {
                icon.textContent = '❌';
                label.textContent = 'Key 未設定';
                btn.className = 'px-5 py-2.5 rounded-xl text-sm font-semibold text-red-600 bg-red-50 border border-red-200 transition-all flex items-center gap-2';
                setTimeout(() => resetTestBtn(), 3000);
                return;
            }

            btn.disabled = true;
            icon.innerHTML = '<span class="loading-spinner"></span>';
            label.textContent = '測試中…';
            btn.className = 'px-5 py-2.5 rounded-xl text-sm font-semibold text-blue-600 bg-blue-50 border border-blue-200 transition-all flex items-center gap-2';

            try {
                const modelName = "gemini-2.5-flash";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeKey}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: 'Reply "OK" only.' }] }] })
                });
                if (res.ok) {
                    icon.textContent = '✅';
                    label.textContent = '連線成功';
                    btn.className = 'px-5 py-2.5 rounded-xl text-sm font-semibold text-green-700 bg-green-50 border border-green-300 transition-all flex items-center gap-2';
                } else {
                    const errJson = await res.json().catch(() => ({}));
                    const msg = errJson.error?.message || `狀態 ${res.status}`;
                    icon.textContent = '❌';
                    label.textContent = `失敗：${msg.slice(0, 30)}`;
                    btn.className = 'px-5 py-2.5 rounded-xl text-sm font-semibold text-red-600 bg-red-50 border border-red-200 transition-all flex items-center gap-2';
                }
            } catch (e) {
                icon.textContent = '❌';
                label.textContent = '網路錯誤';
                btn.className = 'px-5 py-2.5 rounded-xl text-sm font-semibold text-red-600 bg-red-50 border border-red-200 transition-all flex items-center gap-2';
            }

            btn.disabled = false;
            setTimeout(() => resetTestBtn(), 4000);
        };

        function resetTestBtn() {
            document.getElementById('testApiIcon').textContent = '🔑';
            document.getElementById('testApiLabel').textContent = 'API 測試';
            document.getElementById('testApiBtn').className = 'px-5 py-2.5 rounded-xl text-sm font-semibold text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 transition-all flex items-center gap-2';
        }
    </script>
</body>
</html>
